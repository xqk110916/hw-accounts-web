                party: document.getElementById('party').value,
                databit: document.getElementById('databit').value,
                stopbit: document.getElementById('stopbit').value,
                ctl: document.getElementById('ctl').value,
            };

            var printer = new ZPL_JSSDK.Printer(ip, model, timeout, port, interfacePort, tag, tag_port, COM_DATA);
            printer.setPrintData(printdata);

            g_tasks.push(printer);

            connect();

        //ͼƬתBase64����
        function convertImgToBase64(url, callback, outputFormat) {
            var canvas = document.createElement('CANVAS'),
                ctx = canvas.getContext('2d'),
                img = new Image;
            img.crossOrigin = 'Anonymous';
            img.onload = function () {
                canvas.height = img.height;
                canvas.width = img.width;
                ctx.drawImage(img, 0, 0);
                var dataURL = canvas.toDataURL(outputFormat || 'image/jpeg');
                callback.call(this, dataURL);
                canvas = null;
            };
            img.src = url;
        }
