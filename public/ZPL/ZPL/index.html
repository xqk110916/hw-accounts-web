    <script type='text/javascript'>


        /************************************websocket开始*******************************************************/

        //单线程！！

        //连接测试仪器,获取数据
        var noSupportMessage = "Your browser cannot support WebSocket!";
        var ws;
        var isconnecting = false;
        var isconnected = false;
        var g_usetaskarray = false;		//Warmming: v2.0.2.8版本之前，前端需要队列来维持请求秩序，
        var autoDisConnect = false;		//长连接设置
        var g_tasks = new Array;

        function goon() {
            //如果还存在任务，就继续发送
            if (g_tasks.length > 0) {
                var p = g_tasks[0];
                g_tasks.splice(0, 1);
                p.print();
            }
            else if (autoDisConnect) {
                disconnectWebSocket();
                //alert("所有任务发送完毕，网络即将断开!");		
            }
        }

        //有两台，这一套是20字节的版本
        let g_statusarray_20 = [
            { name: "STATE_NORMAL", desc: "正常" },
            { name: "STATE_HIGHT_TEMP", desc: "高温" },
            { name: "STATE_STANDBY", desc: "待机" },
            { name: "STATE_PRINTING", desc: "打印中" },
            { name: "STATE_TOF_ERROR", desc: "标签定位异常" },
            { name: "STATE_LABEL_END", desc: "纸用尽" },
            { name: "STATE_RIBBON_END", desc: "碳带用尽" },
            { name: "STATE_LABEL_SEIZING", desc: "卡纸" },
            { name: "STATE_LABEL_JUMPPING", desc: "跳标" },
            { name: "STATE_LABEL_CALIBRATING", desc: "标签学习中" },
            { name: "STATE_CUTTER_ERROR", desc: "切刀异常" },
            { name: "STATE_FORM_ERROR", desc: "标签格式异常" },
            { name: "STATE_MEMORY_WRITE_ERROR", desc: "记忆体写入异常" },
            { name: "STATE_ILLEGAL_COMMAND", desc: "非法指令" },
            { name: "STATE_COVER_OPEN", desc: "盒盖未到位" },
            { name: "STATE_RIBBON_NEAR_END", desc: "碳带将尽" },
        ];

        //这套是5字节的版本
        let g_statusarray_5 = [
            { name: "PL_PRINTER_STU_NORMAL", desc: "正常" },
            { name: "PL_PRINTER_STU_COVER_OUT", desc: "开盖" },
            { name: "PL_PRINTER_STU_TPH_COVER_OUT", desc: "机芯盖开启" },
            { name: "PL_PRINTER_STU_PAPER_OUT", desc: "缺纸" },
            { name: "PL_PRINTER_STU_PRINTING", desc: "打印中" },
            { name: "PL_PRINTER_STU_TEMP_HIGH", desc: "头片过温" },
            { name: "PL_PRINTER_STU_LOCAT_FAIL", desc: "定位失败" },
            { name: "PL_PRINTER_STU_PAUSE", desc: "暂停" },
            { name: "PL_PRINTER_STU_LOCAT_LEARNING", desc: "标签学习中" },
            { name: "PL_PRINTER_STU_RIBBON_OUT", desc: "缺碳带" },
            { name: "PL_PRINTER_STU_TPH_ERROR", desc: "头片错误" },
            { name: "PL_PRINTER_STU_MEM_FAIL", desc: "记忆体写入异常" },
            { name: "PL_PRINTER_STU_PAPER_JAM", desc: "卡纸" },
            { name: "PL_PRINTER_STU_PAPER_STAY", desc: "未取纸" },
            { name: "PL_PRINTER_STU_RIBBON_NEAR_END", desc: "碳带将尽" },
            { name: "PL_PRINTER_STU_PAPER_NEAR_END", desc: "纸将尽" },
            { name: "PL_PRINTER_STU_CUTTER_ERROR", desc: "切刀异常" },
            { name: "PL_PRINTER_STU_FEED_PAPER_CHANNEL_ERROR", desc: "走纸通道错误" },
            { name: "PL_PRINTER_STU_DOOR_ERROR", desc: "门侦测错误" },
            { name: "PL_PRINTER_STU_VOLTAGE_ERROR", desc: "电压异常" },
        ];
        //注意：个别早期机型的状态可能没有按照这两套通用的来
        //连接服务器
        function connect() {

            //resolve触发then,reject触发catch
            return new Promise((resolve, reject) => {

                if (isconnecting || isconnected) {
                    resolve()
                    return;
                }

                isconnecting = true;

                let ip = document.getElementById('ip').value;
                var port = document.getElementById('port').value;
                // var timeout = document.getElementById('timeout').value;
                var timeout = 3000;
                var tag = document.getElementById('tag').value;
                var tag_port = document.getElementById('tag_port').value;
                var COM_DATA = {
                    port: document.getElementById('com_port').value,
                    baudrate: document.getElementById('baudrate').value,
                    party: document.getElementById('party').value,
                    databit: document.getElementById('databit').value,
                    stopbit: document.getElementById('stopbit').value,
                    ctl: document.getElementById('ctl').value,
                };

                var support = "MozWebSocket" in window ? 'MozWebSocket' : ("WebSocket" in window ? 'WebSocket' : null);
                if (support == null) {
                    //提示错误信息
                    reject("* " + noSupportMessage + "<br/>")
                    return;
                }

                console.log("* 服务器连接中 ......");

                // 创建一个新连接
                ws = new window[support]('ws://' + ip + ':' + port);

                //ws._create_default_https_context = ws._create_unverified_context

                ws.onerror = function (e) {
                    isconnecting = false;
                    reject(applyI18nMsg('网络连接服务失败!') + e)
                    return;
                }

                ws.onclose = function (e) {
                    isconnecting = false;
                    isconnected = false;
                    console.log("连接已关闭!");
                    reject(applyI18nMsg('网络关闭，错误码:') + e.code)
                    //ws.close();
                    return;
                }

                //连接建立之后
                ws.onopen = function () {
                    console.log("连接已建立!");
                    isconnecting = false;
                    isconnected = true;
                    resolve();
                    return;
                };

                // 返回数据处理
                ws.onmessage = function (evt) {
                    var obj = JSON.parse(evt.data);
                    //状态
                    if (obj.code == 0
                        && obj.fun != ''
                        && obj.fun == 'ZPL_GetPrinterStatus') {
                        var str = "";
                        for (var i = 0; i < obj.data.length; i++) {
                            //20字节版本
                            for (var j = 0; j < g_statusarray_20.length; ++j) {
                                if (obj.data[i].name != g_statusarray_20[j].name)
                                    continue;

                                if (obj.data[i].value != 1)
                                    continue;

                                if (j == 0) {
                                    alert(applyI18nStatus(g_statusarray_20[j]));
                                    return;
                                }

                                str += applyI18nStatus(g_statusarray_20[j]);
                                str += ";";
                            }

                            //5字节版本
                            for (var j = 0; j < g_statusarray_5.length; ++j) {
                                if (obj.data[i].name != g_statusarray_5[j].name)
                                    continue;

                                if (obj.data[i].value != 1)
                                    continue;

                                if (j == 0) {
                                    alert(applyI18nStatus(g_statusarray_5[j]));
                                    return;
                                }

                                str += applyI18nStatus(g_statusarray_5[j]);
                                str += ";";
                            }

                        }

                        alert(str);
                    }
                    else {
                        var msg = applyI18nMsg("返回信息：") + obj.msg;
                        if (obj.fun != '') {
                            msg += ("\r\n" + applyI18nMsg("返回数据：") + obj.data);
                        }

                        alert(msg);
                    }

                    if (g_usetaskarray) {
                        goon();
                    }
                    else if (autoDisConnect) {
                        disconnectWebSocket();
                    }

                    return obj;
                }

            })

        }

        //发送数据
        function pushData(ip, port, data) {
            if (!isconnected) {
                console.log("连接尚未建立，发送失败......");
                return;
            }

            ws.send(data);
        }

        //断开连接
        function disconnectWebSocket() {
            if (ws) {
                ws.close();
                isconnected = false;
            }
        }

        /************************************websocket结束*******************************************************/

        async function print(printdata) {
            let fun = () => {
                //提取参数【旧的代码，保留】
                //后端地址
                var ip = document.getElementById('ip').value;
                var port = document.getElementById('port').value;				//服务器
                // var timeout = document.getElementById('timeout').value;
                var timeout = 3000;
                //打印机参数
                var tag = document.getElementById('tag').value;
                var tag_port = document.getElementById('tag_port').value;		//打印机端口


                var model = document.getElementById('model').value;
                var interfacePort = document.getElementById('interfacePort').value;
                var COM_DATA = {
                    port: document.getElementById('com_port').value,
                    baudrate: document.getElementById('baudrate').value,
                    party: document.getElementById('party').value,
                    databit: document.getElementById('databit').value,
                    stopbit: document.getElementById('stopbit').value,
                    ctl: document.getElementById('ctl').value,
                };
                //描述符在这里可以写死
                //interfacePort = "COM1,115200,n,8,1,n"
                //interfacePort = "USB,any,vid=0x20d1,pid=0x0700"
				//interfacePort = "BUF"
                var printer = new ZPL_JSSDK.Printer(ip, model, timeout, port, interfacePort, tag, tag_port, COM_DATA);

                printer.setPrintData(printdata);

                if (g_usetaskarray) {
                    g_tasks.push(printer);		//新版本支持任务缓存，已经可以不再依赖队列
                    goon();
                } else {
                    printer.print();
                }

            };

            await connect()
            fun()

        }

        /*****************************调用开始**************************************/
        // 文本打印
        var oBtnReceiptor = document.getElementById('btn-receipt');
        oBtnReceiptor.onclick = function () {
            var builder = new ZPL_JSSDK.Builder();

            builder.ZPL_StartFormat();

            builder.ZPL_SetLabelLength(500);
            builder.ZPL_SetChangeFontEncoding(14);

			builder.ZPL_setUserFontName("ANMDS", "C");
			//builder.ZPL_scalableFontText(150，150，"C", 0，25，25，"SubBundleID");

            builder.ZPL_SetPrintQuantity(1, 0, 1, "Y");

            //builder.Text(100, 100, 16, 0, 30, 30, "TEST PRINT TEXT 456");
            builder.ZPL_Text(100, 100, 16, 0, 30, 30, "汉字汉子进行中文测试中文测试中文测试中文测试");
            builder.ZPL_EndFormat();

            print(builder.getPrintData());
            return false;
        }

        // 文本打印2 【带自动换行】
        var oBtnReceiptor2 = document.getElementById('btn-receipt2');
        oBtnReceiptor2.onclick = function () {
            var builder = new ZPL_JSSDK.Builder();

            builder.ZPL_StartFormat();

            builder.ZPL_SetLabelLength(500);
            builder.ZPL_SetChangeFontEncoding(14);

            //builder.Text(100, 100, 16, 0, 30, 30, "TEST PRINT TEXT 456");
            builder.ZPL_Text_BlockEx(20, 20, 14, 0, 30, 30,
                300, 10, 0, 5, 5,
                "进行中文测试中文测试中文测试中文测试,dksdasdldsjkkasdjfsdla;2131156急啊急啊哈啊哈哈哈");
            builder.ZPL_EndFormat();

            print(builder.getPrintData());
            return false;
        }
		// 文本打印3【打印位置指令为FT不是FO】
        var oBtnReceiptor3 = document.getElementById('btn-receipt3');
        oBtnReceiptor3.onclick = function () {
            var builder = new ZPL_JSSDK.Builder();

            builder.ZPL_StartFormat();

            builder.ZPL_SetLabelLength(500);
            builder.ZPL_SetChangeFontEncoding(14);

            builder.ZPL_SetPrintQuantity(1, 0, 1, "Y");

            //builder.Text(100, 100, 16, 0, 30, 30, "TEST PRINT TEXT 456");
            builder.ZPL_Text_extend(100, 100, 16, 0, 30, 30, "汉字汉子进行中文测试中文测试中文测试中文测试");
            builder.ZPL_EndFormat();

            print(builder.getPrintData());
            return false;
        }
        //打印二维码
        var codePrinter = document.getElementById('btn-codet');
        codePrinter.onclick = function () {
            var builder = new ZPL_JSSDK.Builder();
            builder.ZPL_StartFormat();

            //设置了打印浓度
            builder.ZPL_SetPrintDarkness(20);
            //设置标签长度
            builder.ZPL_SetLabelLength(500);
            builder.ZPL_SetChangeFontEncoding(14);

            //builder.ZPL_QRCode(100, 100, 0, 1, 3, 'M', 7, "1000000001");
            //builder.ZPL_QRCode(100, 100, 0, 1, 3, 'M', 'M', 'A', "HPF00039.1");	// by wjz

        //端口切换控制
        function content_show(_val) {
            if (_val == 'COM') {
                $('.other_data_box').hide();
                $('.com_data_box').show();
            } else {
                $('.com_data_box').hide();
                $('.other_data_box').show();
                if (_val == 'USB') {
                    $('#tag_port').hide();
                    $('#tag').val('');
                    $('#tag').attr('placeholder', applyI18nMsg("请输入SN"));
                } else {
                    $('#tag_port').show();
                    $('#tag').val('');
                    $('#tag').attr('placeholder', applyI18nMsg("请输入打印机IP"));
                }
            }
        }

        //网络图片转Base64数据
        function convertImgToBase64(url, callback, outputFormat) {
            var canvas = document.createElement('CANVAS'),
                ctx = canvas.getContext('2d'),
                img = new Image;
            img.crossOrigin = 'Anonymous';
            img.onload = function () {
                canvas.height = img.height;
                canvas.width = img.width;
                ctx.drawImage(img, 0, 0);
                var dataURL = canvas.toDataURL(outputFormat || 'image/jpeg');
                callback.call(this, dataURL);
                canvas = null;
            };
            img.src = url;
        }
